<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Clone TTS</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #09090B; --panel: #111114; --line: #2A2A30; --text: #F5F5F6; --muted: #A1A1AA; --accent: #D6A95C; --red: #EF4444; --green: #22C55E; --font: "Outfit", ui-sans-serif, sans-serif; }
    body { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 30% 20%, rgba(214,169,92,.08), transparent 50%), var(--bg); font-family: "Inter", ui-sans-serif, sans-serif; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; padding: 44px 40px; width: 400px; max-width: 92vw; }
    .logo { font: 800 1.4rem var(--font); color: var(--accent); text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 32px; }
    label { display: block; font-size: .85rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; background: #1A1A1F; border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-size: .95rem; outline: none; margin-bottom: 18px; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 13px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; background: var(--accent); color: #09090B; display:flex;align-items:center;justify-content:center;gap:8px }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#09090B;border-radius:50%;animation:spin .6s linear infinite;display:none }
    .btn.loading .spinner { display:inline-block }
    .btn.loading .btn-text { display:none }
    @keyframes spin { to { transform:rotate(360deg) } }
    .error { color: var(--red); font-size: .85rem; margin-bottom: 12px; display: none; }
    .error.show { display: block; }
    .checkbox { display:flex;align-items:center;gap:8px;margin-bottom:18px;color:var(--muted);font-size:.85rem }
    .checkbox input { width:auto;margin:0;accent-color:var(--accent) }
    .link { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
    .link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Clone TTS</div>
    <div class="subtitle">Đăng nhập vào tài khoản của bạn</div>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" />
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      <label class="checkbox"><input type="checkbox" id="remember" checked /> Ghi nhớ đăng nhập</label>
      <button type="submit" class="btn" id="submitBtn"><span class="spinner"></span><span class="btn-text">Đăng nhập</span></button>
    </form>
    <div style="display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--faint);font-size:.8rem">
      <hr style="flex:1;border:none;border-top:1px solid var(--line)" /><span>HOẶC</span><hr style="flex:1;border:none;border-top:1px solid var(--line)" />
    </div>
    <div id="g_id_onload"
         data-client_id="GOOGLE_CLIENT_ID"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleCredential"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left" style="width:100%;min-height:44px"></div>
    <div class="link" style="margin-top:14px">Chưa có tài khoản? <a href="/signup">Đăng ký</a></div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const remember = document.getElementById("remember");
    const error = document.getElementById("error");
    const btn = document.getElementById("submitBtn");

    const params = new URLSearchParams(location.search);
    if (params.get("registered")) {
      error.textContent = "Đăng ký thành công! Vui lòng đăng nhập.";
      error.className = "error show";
      error.style.color = "var(--green)";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      error.className = "error";
      btn.disabled = true;
      btn.classList.add("loading");
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email.value, password: password.value }),
        });
        const data = await r.json();
        if (!r.ok) {
          error.textContent = data.message || data.detail || "Đăng nhập thất bại";
          error.className = "error show";
          btn.disabled = false; btn.classList.remove("loading");
          return;
        }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = data.user.role === "admin" ? "/admin/" : "/dashboard";
      } catch (err) {
        error.textContent = "Lỗi kết nối đến server";
        error.className = "error show";
        btn.disabled = false; btn.classList.remove("loading");
      }
    });
  </script>
  <div class="toast" id="googleToast" style="position:fixed;bottom:30px;right:30px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 20px;font-size:.9rem;display:none;z-index:100"></div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    // Fetch config and set Google Client ID
    fetch("/api/config").then(r => r.json()).then(config => {
      const el = document.getElementById("g_id_onload");
      if (config.google_client_id) {
        el.setAttribute("data-client_id", config.google_client_id);
      } else {
        el.style.display = "none";
        document.querySelector(".g_id_signin")?.style.setProperty("display", "none");
      }
    }).catch(() => {});

    function showToast(msg) {
      const t = document.getElementById("googleToast");
      t.textContent = msg; t.style.display = "block";
      setTimeout(() => { t.style.display = "none"; }, 5000);
    }

    async function handleGoogleCredential(response) {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.classList.add("loading");
      try {
        // Get client_id from the page
        const el = document.getElementById("g_id_onload");
        const clientId = el.getAttribute("data-client_id");

        const r = await fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential, client_id: clientId }),
        });
        const data = await r.json();
        if (!r.ok) {
          showToast(data.message || data.detail || "Google đăng nhập thất bại");
          btn.disabled = false; btn.classList.remove("loading");
          return;
        }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        showToast(data.message || "Đăng nhập thành công!");
        setTimeout(() => {
          window.location.href = data.user.role === "admin" ? "/admin/" : "/dashboard";
        }, 1500);
      } catch (err) {
        showToast("Lỗi kết nối: " + err.message);
        btn.disabled = false; btn.classList.remove("loading");
      }
    }
  </script>
</body>
</html>
