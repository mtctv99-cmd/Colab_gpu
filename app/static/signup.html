<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký — Colab TTS</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090B; --panel: #111114; --line: #2A2A30;
      --text: #F5F5F6; --muted: #A1A1AA; --accent: #D6A95C;
      --red: #EF4444; --green: #22C55E; --font: "Outfit", ui-sans-serif, sans-serif;
    }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(circle at 70% 80%, rgba(214,169,92,.08), transparent 50%), var(--bg);
      font-family: "Inter", ui-sans-serif, sans-serif;
    }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 22px;
      padding: 44px 40px; width: 400px; max-width: 92vw;
    }
    .logo { font: 800 1.4rem var(--font); color: var(--accent); text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 32px; }
    label { display: block; font-size: .85rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; background: #1A1A1F; border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-size: .95rem; outline: none; margin-bottom: 18px; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 13px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; background: var(--accent); color: #09090B; }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .error { color: var(--red); font-size: .85rem; margin-bottom: 12px; display: none; }
    .error.show { display: block; }
    .link { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
    .link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Colab TTS</div>
    <div class="subtitle">Tạo tài khoản mới</div>
    <div class="error" id="error"></div>
    <form id="signupForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" />
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6" autocomplete="new-password" />
      <button type="submit" class="btn" id="submitBtn">Đăng ký</button>
    </form>
    <div class="link">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
  </div>

  <script>
    const form = document.getElementById("signupForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const error = document.getElementById("error");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      error.className = "error";
      btn.disabled = true;
      btn.textContent = "Đang xử lý...";
      try {
        const r = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email.value, password: password.value }),
        });
        const data = await r.json();
        if (!r.ok) {
          error.textContent = data.message || data.detail || "Đăng ký thất bại";
          error.className = "error show";
          btn.disabled = false; btn.textContent = "Đăng ký";
          return;
        }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/dashboard";
      } catch (err) {
        error.textContent = "Lỗi kết nối đến server";
        error.className = "error show";
        btn.disabled = false; btn.textContent = "Đăng ký";
      }
    });
  </script>
</body>
</html>
