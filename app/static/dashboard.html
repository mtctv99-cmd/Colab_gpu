<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Colab TTS</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500&display=swap");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090B; --panel: #111114; --panel-2: #151519;
      --line: #2A2A30; --text: #F5F5F6; --muted: #A1A1AA; --faint: #71717A;
      --accent: #D6A95C; --green: #22C55E; --red: #EF4444; --blue: #60A5FA;
      --font: "Outfit", ui-sans-serif, sans-serif; --radius: 18px;
    }
    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: "Inter", ui-sans-serif, sans-serif;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
    .logo { font: 800 1.2rem var(--font); color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; margin-left: 20px; font-size: .9rem; cursor: pointer; }
    nav a:hover, nav a.active { color: var(--text); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
    .card h2 { font: 600 1.15rem var(--font); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .balance-big { font: 800 2.8rem var(--font); color: var(--accent); }
    .balance-label { color: var(--faint); font-size: .85rem; margin-top: 2px; }
    .row { display: flex; gap: 20px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    .stat { color: var(--faint); font-size: .85rem; }
    .stat span { color: var(--text); font-weight: 600; font-size: 1.2rem; display: block; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { text-align: left; color: var(--faint); font-weight: 500; padding: 8px 0; border-bottom: 1px solid var(--line); }
    td { padding: 10px 0; border-bottom: 1px solid var(--line-soft, rgba(255,255,255,.05)); }
    .api-key { font-family: monospace; color: var(--accent); font-size: .85rem; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .78rem; font-weight: 500; }
    .badge.active { background: rgba(34,197,94,.15); color: var(--green); }
    .badge.inactive { background: rgba(239,68,68,.15); color: var(--red); }
    .btn { display: inline-block; padding: 8px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: .85rem; }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn-primary { background: var(--accent); color: #09090B; }
    .btn-primary:hover { opacity: .9; }
    .btn-danger { background: rgba(239,68,68,.15); color: var(--red); }
    .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--text); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 20px; font-size: .9rem; display: none; z-index: 100; }
    .toast.show { display: block; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; place-items: center; z-index: 99; }
    .modal-bg.show { display: grid; }
    .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; padding: 36px; width: 440px; max-width: 92vw; }
    .modal h3 { font: 600 1.2rem var(--font); margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
    .modal input { width: 100%; padding: 10px 14px; background: #1A1A1F; border: 1px solid var(--line); border-radius: 10px; color: var(--text); font-size: .9rem; outline: none; margin-bottom: 16px; }
    .modal input:focus { border-color: var(--accent); }
    .modal .btn + .btn { margin-left: 10px; }
    .key-display { background: #1A1A1F; border: 1px solid var(--accent); border-radius: 10px; padding: 12px; font-family: monospace; font-size: .8rem; word-break: break-all; margin-bottom: 12px; color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Colab TTS</div>
      <nav>
        <a class="active" id="navDashboard">Dashboard</a>
        <a id="navApiKeys">API Keys</a>
        <a id="navUsage">Lịch sử</a>
        <a id="navLogout">Đăng xuất</a>
      </nav>
    </header>

    <div id="sectionDashboard">
      <div class="card">
        <h2>💰 Số dư ký tự</h2>
        <div class="balance-big id="balanceDisplay">0</div>
        <div class="balance-label">ký tự còn lại (prepaid)</div>
      </div>
      <div class="row">
        <div class="card">
          <div class="stat">Đã dùng<span id="totalUsed">0</span></div>
        </div>
        <div class="card">
          <div class="stat">API keys<span id="apiKeyCount">0</span></div>
        </div>
        <div class="card">
          <div class="stat">Email<span id="userEmail" style="font-size:1rem;color:var(--text)"></span></div>
        </div>
      </div>
    </div>

    <div id="sectionApiKeys" style="display:none">
      <div class="card">
        <h2>🔑 API Keys</h2>
        <div style="margin-bottom:16px">
          <input type="text" id="newKeyName" placeholder="Tên key (vd: Production)" style="padding:10px 14px;background:#1A1A1F;border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;width:260px;margin-right:10px" />
          <button class="btn btn-primary" id="createKeyBtn">Tạo key mới</button>
        </div>
        <table>
          <thead><tr><th>Tên</th><th>Key</th><th>Trạng thái</th><th>Lần cuối</th><th></th></tr></thead>
          <tbody id="apiKeyList"></tbody>
        </table>
      </div>
    </div>

    <div id="sectionUsage" style="display:none">
      <div class="card">
        <h2>📊 Lịch sử sử dụng</h2>
        <table>
          <thead><tr><th>Thời gian</th><th>Ký tự</th><th>Chi phí</th><th>Nguồn</th></tr></thead>
          <tbody id="usageList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="newKeyModal">
    <div class="modal">
      <h3>🔑 API Key mới</h3>
      <p>Copy key này ngay — nó sẽ không hiển thị lại.</p>
      <div class="key-display" id="keyDisplay"></div>
      <button class="btn btn-primary" id="copyKeyBtn">Sao chép</button>
      <button class="btn btn-outline" id="closeModalBtn">Đóng</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "";
    function getToken() { return localStorage.getItem("token"); }
    function getUser() { try { return JSON.parse(localStorage.getItem("user")); } catch { return null; } }
    function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.className = "toast show"; setTimeout(() => t.className = "toast", 3000); }

    async function api(path, opts = {}) {
      const token = getToken();
      if (!token) { window.location.href = "/login"; return null; }
      const r = await fetch(API + path, {
        ...opts,
        headers: { ...opts.headers, "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      });
      if (r.status === 401) { localStorage.clear(); window.location.href = "/login"; return null; }
      const data = await r.json().catch(() => null);
      if (!r.ok) throw new Error(data?.message || data?.detail || `HTTP ${r.status}`);
      return data;
    }

    async function loadDashboard() {
      try {
        const user = await api("/api/auth/profile");
        if (!user) return;
        document.getElementById("balanceDisplay").textContent = user.balance.toLocaleString();
        document.getElementById("userEmail").textContent = user.email;

        const usage = await api("/api/auth/usage");
        document.getElementById("totalUsed").textContent = (usage?.total_used || 0).toLocaleString();

        const keys = await api("/api/auth/api-keys");
        document.getElementById("apiKeyCount").textContent = (keys || []).length;
      } catch (e) { showToast("Lỗi tải dashboard: " + e.message); }
    }

    async function loadApiKeys() {
      try {
        const keys = await api("/api/auth/api-keys");
        const tbody = document.getElementById("apiKeyList");
        tbody.innerHTML = "";
        if (!keys || keys.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="color:var(--faint);text-align:center;padding:20px">Chưa có API key nào</td></tr>';
          return;
        }
        keys.forEach(k => {
          const tr = document.createElement("tr");
          const active = k.is_active;
          tr.innerHTML = `
            <td>${k.name}</td>
            <td class="api-key">${k.key_prefix}...</td>
            <td><span class="badge ${active ? 'active' : 'inactive'}">${active ? 'Active' : 'Inactive'}</span></td>
            <td style="color:var(--faint);font-size:.85rem">${k.last_used_at ? new Date(k.last_used_at).toLocaleDateString() : 'Chưa dùng'}</td>
            <td>${active ? `<button class="btn btn-sm btn-danger" onclick="deactivateKey(${k.id})">Deactivate</button>` : ''}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) { showToast("Lỗi tải API keys: " + e.message); }
    }

    async function loadUsage() {
      try {
        const data = await api("/api/auth/usage");
        const tbody = document.getElementById("usageList");
        tbody.innerHTML = "";
        if (!data || !data.records || data.records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="color:var(--faint);text-align:center;padding:20px">Chưa có lịch sử sử dụng</td></tr>';
          return;
        }
        data.records.forEach(r => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="color:var(--faint);font-size:.85rem">${new Date(r.created_at).toLocaleString()}</td>
            <td>${r.characters}</td>
            <td style="color:var(--accent)">-${r.cost}</td>
            <td><span class="badge active">${r.source}</span></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) { showToast("Lỗi tải lịch sử: " + e.message); }
    }

    async function createKey() {
      const name = document.getElementById("newKeyName").value.trim() || "Default";
      try {
        const data = await api("/api/auth/api-keys", {
          method: "POST",
          body: JSON.stringify({ name }),
        });
        document.getElementById("keyDisplay").textContent = data.key;
        document.getElementById("newKeyModal").className = "modal-bg show";
        document.getElementById("newKeyName").value = "";
        loadApiKeys();
      } catch (e) { showToast("Lỗi tạo key: " + e.message); }
    }

    async function deactivateKey(id) {
      if (!confirm("Deactivate this API key?")) return;
      try {
        await api(`/api/auth/api-keys/${id}`, { method: "DELETE" });
        showToast("Key đã được deactivate");
        loadApiKeys();
      } catch (e) { showToast("Lỗi: " + e.message); }
    }

    document.getElementById("copyKeyBtn").addEventListener("click", () => {
      const text = document.getElementById("keyDisplay").textContent;
      navigator.clipboard.writeText(text).then(() => showToast("Đã copy key"));
    });
    document.getElementById("closeModalBtn").addEventListener("click", () => {
      document.getElementById("newKeyModal").className = "modal-bg";
    });
    document.getElementById("createKeyBtn").addEventListener("click", createKey);

    function showSection(id) {
      ["Dashboard","ApiKeys","Usage"].forEach(s => {
        document.getElementById("section" + s).style.display = s === id ? "block" : "none";
        document.getElementById("nav" + s).className = s === id ? "active" : "";
      });
    }

    document.getElementById("navDashboard").addEventListener("click", () => { showSection("Dashboard"); loadDashboard(); });
    document.getElementById("navApiKeys").addEventListener("click", () => { showSection("ApiKeys"); loadApiKeys(); });
    document.getElementById("navUsage").addEventListener("click", () => { showSection("Usage"); loadUsage(); });
    document.getElementById("navLogout").addEventListener("click", () => { localStorage.clear(); window.location.href = "/"; });

    const user = getUser();
    if (!user || !getToken()) { window.location.href = "/login"; }
    loadDashboard();
  </script>
</body>
</html>
